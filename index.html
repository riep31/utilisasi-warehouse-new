<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Utilisasi Warehouse</title>
    
    <link rel="manifest" href="./manifest.json">
    
    <link rel="stylesheet" href="./css/style.css">
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Gradient tetap sebagai fallback jika CSS gagal muat */
            background: #2c3e50;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            margin: 0;
            font-family: sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 { margin-bottom: 20px; color: #2c3e50; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; color: #666; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Penting agar input tidak luber */
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🏭 Warehouse System</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="Masukkan username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Masukkan password">
            </div>
            <button type="submit" class="btn-login">MASUK</button>
        </form>
    </div>

    <script>
        // Registrasi Service Worker agar PWA aktif
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.error('SW Registration Failed', err));
            });
        }

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if(u === 'admin' && p === '12345') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', u);
                // Gunakan ./ agar path tetap di direktori yang sama
                window.location.href = './app.html';
            } else {
                alert('Login Gagal! Gunakan admin/12345');
            }
        };
    </script>
</body>
</html>
